name: Taiwan Stock Daily Digest

on:
  schedule:
    # 每天 UTC+8 07:30 執行（台股 9:00 開盤前準備好昨日彙整）
    # 或改為 UTC 08:00 = UTC+8 16:00（收盤後當日彙整）
    - cron: '30 23 * * 1-5'   # 週一至週五 UTC 23:30 = 隔日 UTC+8 07:30
  workflow_dispatch:           # 允許手動觸發（測試用）

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # 允許 push 回 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/main.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "📊 Daily update $(date +%Y-%m-%d)"
          git push
