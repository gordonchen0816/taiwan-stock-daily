name: Daily Stock Report

on:
  schedule:
    # 每小時的 0 分自動執行 (UTC 時間 0 分即為台灣時間每小時整點)
    - cron: '0 * * * *'
  workflow_dispatch: # 保留手動按鈕，想看就按

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance openai requests beautifulsoup4 lxml markdown

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Scheduled update HTML: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
