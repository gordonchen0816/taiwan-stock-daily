name: Daily Stock Report
on:
  schedule:
    - cron: '0 22 * * *'  # 每天晚上 10 點執行
  workflow_dispatch:      # 讓你可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai==0.28.0 requests pandas yfinance beautifulsoup4

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.md
          git commit -m "Update daily report [skip ci]" || exit 0
          git push
