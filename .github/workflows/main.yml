name: Daily Stock Report

on:
  schedule:
    - cron: '0 8 * * *' # 每天下午 4 點 (UTC 8)
  workflow_dispatch: # 允許手動執行

permissions:
  contents: write # 關鍵：允許機器人寫入檔案

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance openai requests beautifulsoup4 lxml

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.md
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
          # 加上日期確保每次 commit 內容都不同，強制更新
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
