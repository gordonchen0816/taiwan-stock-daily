name: Update Finance Report

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 新增：給予 Actions 寫入權限，否則無法更新網頁
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance openai requests beautifulsoup4 markdown

      - name: Run main script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html history.json
          # 檢查是否有變動，避免空提交報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 每小時自動化分析報告更新: $(date)" && git push)
