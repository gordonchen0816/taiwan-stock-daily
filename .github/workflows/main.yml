name: Daily Stock Report

on:
  schedule:
    # 這是 UTC 時間，換算台灣時間 (UTC+8) 為：
    # 18:00 (台 02:00), 00:00 (台 08:00), 06:00 (台 14:00), 12:00 (台 20:00)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 依然保留手動按鈕，隨時想看隨時按

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance openai requests beautifulsoup4 lxml markdown

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Scheduled update HTML: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
