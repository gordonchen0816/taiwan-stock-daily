name: Update Finance Report

on:
  schedule:
    - cron: '0 */2 * * *' # 每兩小時執行一次 (0, 2, 4... UTC)
  workflow_dispatch:      # 允許手動隨時執行

permissions:
  contents: write         # 賦予寫入權限，讓 Actions 能存檔 history.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance openai requests beautifulsoup4 markdown pandas

      - name: Run main script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 確保在 Push 前拉取最新遠端更動，避免頻繁更新造成的衝突
          git pull origin main --rebase || true
          
          # 將 index.html 和 history.json 加入追蹤
          git add index.html history.json || true
          
          # 提交更改，如果沒有變動則跳過
          git commit -m "Update report and memory [skip ci]" || true
          
          # 推送到 main 分支
          git push origin main
