name: Update Finance Report

on:
  schedule:
    - cron: '0 9 * * 1-5' # 台北時間下午 5 點執行 (1-5)
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write         # 關鍵：允許機器人將記憶存回倉庫

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance openai requests beautifulsoup4 markdown pandas

      - name: Run main script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add index.html history.json || true
          git commit -m "Update report and persistent memory [skip ci]" || true
          git push
